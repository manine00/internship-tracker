services:
  db:
    image: postgres:16
    container_name: internship_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend_
    container_name: internship_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend_:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tracker
    env_file:
      - ./backend_/.env
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend_
    container_name: internship_frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend_:/app:cached
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  pgdata:
